    """
    Filter by fuel type (e.g., ['ELECTRIC', 'PETROL', 'DIESEL', 'PETROL_ELECTRIC_PLUGIN_HYBRID'])
    """
    fuelType: [String]

    """
    Filter by model identifiers (e.g., ['A', 'C', 'E', 'S', 'EQA', 'EQB', 'EQC'])
    """
    modelIdentifier: [String]

    """Filter by body type (e.g., ['LIMOUSINE', 'SUV', 'COUPE', 'CABRIO'])"""
    bodyType: [String]

    """
    Filter by specific color names (e.g., ['metallic blue', 'pearl white', 'gray'])
    """
    colorName: [String]

    """Filter by color codes"""
    color: [String]

    """Filter by price range"""
    price: ValueRange

    """Filter by engine power in HP"""
    enginePowerHP: IntRange

    """Filter by number of seats"""
    seats: [Int]

    """Filter by equipment names or codes"""
    equipment: [String]

    """Filter by drive type/propulsion (e.g., ['AWD', 'RWD', 'FWD'])"""
    driveType: [String]

    """Filter by gearbox/transmission type (e.g., ['MANUAL', 'AUTOMATIC'])"""
