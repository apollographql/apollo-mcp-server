  """
  Advanced generic vehicle search that can satisfy all common search scenarios.
  This resolver can handle all the prompts from prompts.md with comprehensive filtering.
  
  ⚠️  CRITICAL: ALWAYS include facets in your query selection set!
  The facets provide the exact filter values available for this market.
  Use GetSearchOptionsForMarketAndVehicleType operation first to discover all available options.
  """
