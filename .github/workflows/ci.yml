name: CI
on:
  push:
    # don't run on tags, run on commits
    # https://github.com/orgs/community/discussions/25615
    tags-ignore:
      - "**"
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  clippy:
    name: Run Clippy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo clippy --all-targets -- --deny warnings

  doc:
    name: Run Cargo Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --no-deps

  fmt:
    name: Run Cargo Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build
  installer:
    name: Check Installer Target Selection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash ./scripts/nix/test-install.sh
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test
  coverage:
    name: Calculate Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --codecov --output-path codecov.json
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: true

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image from current code
        run: docker build -t apollo-mcp-server:local .

      - name: Run e2e smoke tests
        uses: apollographql/release-tooling/rtf-run-test-plan@main
        with:
          test_plan_path: e2e/rtf/smoke/test-plan.yaml
          vars_file: e2e/rtf/smoke/ci-variables.json
          github_token: ${{ secrets.RTF_MCP_REPO_PAT }}
