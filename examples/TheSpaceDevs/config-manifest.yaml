# manifest source — load a fixed set of operations from a persisted query
# manifest file generated by @apollo/generate-persisted-query-manifest.
# Good for shipping an audited, locked-down set of operations.
endpoint: https://thespacedevs-production.up.railway.app/
transport:
  type: streamable_http
operations:
  source: manifest
  path: ./examples/TheSpaceDevs/persisted_queries/apollo.json
schema:
  source: local
  path: ./examples/TheSpaceDevs/api.graphql
overrides:
  mutation_mode: all
introspection:
  execute:
    enabled: true
  introspect:
    enabled: true
  search:
    enabled: true
  validate:
    enabled: true
cors:
  enabled: true
  allow_any_origin: true
