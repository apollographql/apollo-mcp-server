transport:
  type: streamable_http
operations:
  source: local
  paths:
    - ./examples/weather/operations
schema:
  source: local
  path: ./examples/weather/api.graphql
introspection:
  execute:
    enabled: true
  introspect:
    enabled: true
  search:
    enabled: true
  validate:
    enabled: true
cors:
  enabled: true
  allow_any_origin: true
